<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administracion de Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111c34;
      --panel-2: #152545;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --line: #233458;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Outfit", sans-serif;
      background: radial-gradient(circle at 20% 10%, #12345f 0, transparent 35%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .head h1 { margin: 0; font-size: 1.6rem; }
    .head .actions { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn.primary { border-color: #2563eb; background: #1d4ed8; }
    .btn.warn { border-color: #b45309; background: #92400e; }
    .btn.danger { border-color: #991b1b; background: #b91c1c; }
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(21,37,69,0.95), rgba(17,28,52,0.95));
      border-radius: 14px;
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }
    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }
    label { font-size: 0.86rem; color: var(--muted); }
    input, select {
      width: 100%;
      background: #0b1328;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      outline: none;
    }
    .full { grid-column: 1 / -1; }
    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .checks label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 0.86rem;
    }
    .checks input { width: auto; }
    .paneles-box {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    .paneles-group {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: rgba(11, 19, 40, 0.55);
    }
    .paneles-group h4 {
      margin: 0 0 8px;
      font-size: 0.86rem;
      color: #bfdbfe;
      font-weight: 600;
    }
    .acciones-box {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    .acciones-group {
      border: 1px dashed #365081;
      border-radius: 10px;
      padding: 8px;
      background: rgba(8, 15, 33, 0.52);
    }
    .acciones-group h5 {
      margin: 0 0 8px;
      font-size: 0.84rem;
      color: #93c5fd;
      font-weight: 600;
    }
    .table-wrap { overflow: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      font-size: 0.88rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th { color: #bfdbfe; font-weight: 600; }
    .badge {
      border: 1px solid #334155;
      color: #cbd5e1;
      border-radius: 999px;
      font-size: 0.75rem;
      padding: 2px 8px;
      margin-right: 4px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .muted { color: var(--muted); }
    .msg { min-height: 20px; margin-top: 8px; font-size: 0.86rem; }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="head">
      <h1>Modulo Administracion</h1>
      <div class="actions">
        <button class="btn" onclick="window.location.href='/'">Volver al menu</button>
        <button class="btn" onclick="window.location.href='/logout'">Salir</button>
      </div>
    </header>

    <section class="layout">
      <article class="card">
        <h2>Gestion de Usuarios</h2>
        <form id="user-form" class="grid">
          <div class="full">
            <label>Nombre y Apellido</label>
            <input id="f_nombre" required />
          </div>
          <div>
            <label>DNI</label>
            <input id="f_dni" />
          </div>
          <div>
            <label>Legajo</label>
            <input id="f_legajo" />
          </div>
          <div class="full">
            <label>Correo (usuario de acceso)</label>
            <input id="f_correo" required />
          </div>
          <div>
            <label>Contrasena (si vacio, se genera temporal)</label>
            <input id="f_password" />
          </div>
          <div>
            <label>Estado</label>
            <select id="f_estado">
              <option value="ACTIVO">ACTIVO</option>
              <option value="INACTIVO">INACTIVO</option>
            </select>
          </div>
          <div class="full">
            <label>Tipo de Usuario</label>
            <select id="f_tipo">
              <option>ADMINISTRADOR</option>
              <option>SUPERVISOR</option>
              <option>ASISTENTE</option>
              <option>OPERADOR</option>
              <option selected>CONSULTOR</option>
            </select>
          </div>
          <div class="full">
            <label>Permisos por modulo</label>
            <div class="checks" id="modulos-box"></div>
          </div>
          <div class="full">
            <label>Permisos por panel</label>
            <div class="paneles-box" id="paneles-box"></div>
          </div>
          <div class="full">
            <label>Permisos por accion (Logistica)</label>
            <div class="acciones-box" id="acciones-box"></div>
          </div>
          <div class="full">
            <label>Roles funcionales</label>
            <div class="checks" id="roles-box"></div>
          </div>
          <div class="full" style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn primary" type="submit" id="btn-save">Crear usuario</button>
            <button class="btn" type="button" id="btn-cancel" style="display:none;">Cancelar edicion</button>
          </div>
          <div id="form-msg" class="msg full"></div>
        </form>
      </article>

      <article class="card">
        <h2>Usuarios y Accesos</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Contrasena</th>
                <th>Modulos</th>
                <th>Paneles</th>
                <th>Acciones panel</th>
                <th>Roles</th>
                <th>Operaciones</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
        <h2 style="margin-top:12px;">Historial de accesos</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Evento</th>
                <th>Usuario</th>
                <th>Detalle</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="access-body"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

  <script>
    const MODULOS = [
      ["logistica", "Logistica"],
      ["almacen", "Almacen"],
      ["operaciones", "Operaciones"],
      ["compras", "Compras"],
      ["rrhh", "Recursos Humanos"],
      ["mantenimiento", "Mantenimiento"],
      ["dashboard_ejecutivo", "Dashboard Ejecutivo"],
      ["administracion", "Administracion"],
    ];

    const PANELES_POR_MODULO = {
      logistica: [
        ["dashboard", "Dashboard"],
        ["solicitud_viaje", "Solicitud de Viaje"],
        ["asignar_recursos", "Asignar Recursos"],
        ["vehiculos", "Vehiculos"],
        ["personal", "Personal"],
        ["ordenes_salida", "Ordenes de Salida"],
        ["gestion_operativa", "Gestion Operativa"],
      ],
      almacen: [
        ["dashboard", "Dashboard"],
        ["catalogos", "Catalogos"],
        ["productos", "Productos"],
        ["ingresos_salidas", "Ingresos / Salidas"],
        ["documentos", "Documentos"],
        ["movimientos", "Movimientos"],
        ["inventario", "Inventario"],
      ],
    };

    const ACCIONES_POR_MODULO_PANEL = {
      logistica: {
        dashboard: [
          ["ver", "Ver datos de dashboard"],
          ["aprobar_solicitud", "Aprobar solicitud de viaje"],
          ["rechazar_solicitud", "Rechazar solicitud de viaje"],
        ],
        solicitud_viaje: [
          ["crear_solicitud", "Crear solicitud"],
          ["gestionar_estado", "Aprobar / cambiar estado"],
        ],
        asignar_recursos: [
          ["asignar", "Asignar recursos"],
        ],
        vehiculos: [
          ["crear", "Crear vehiculo"],
          ["editar", "Editar vehiculo"],
          ["eliminar", "Eliminar vehiculo"],
        ],
        personal: [
          ["crear", "Crear personal"],
          ["editar", "Editar personal"],
        ],
        ordenes_salida: [
          ["ver", "Ver panel de ordenes"],
          ["guardar_cierre", "Guardar cierre logistico"],
          ["imprimir", "Imprimir"],
          ["cerrar_orden", "(Legado) Cerrar orden"],
        ],
        gestion_operativa: [
          ["consultar", "Buscar / consultar resumen"],
          ["exportar_pdf", "Exportar PDF"],
          ["exportar_excel", "Exportar Excel"],
        ],
      },
      almacen: {
        dashboard: [
          ["ver", "Ver dashboard de almacen"],
        ],
        catalogos: [
          ["consultar", "Consultar catalogos"],
          ["crear", "Crear en catalogos"],
          ["eliminar", "Eliminar en catalogos"],
        ],
        productos: [
          ["consultar", "Consultar productos"],
          ["crear", "Crear producto"],
          ["editar", "Editar producto"],
          ["eliminar", "Eliminar producto"],
        ],
        ingresos_salidas: [
          ["consultar", "Consultar pendientes / historial"],
          ["generar_remito", "Generar remito / documento"],
          ["autorizar_remito", "Autorizar remito"],
          ["no_autorizar_remito", "No autorizar remito"],
        ],
        documentos: [
          ["consultar", "Consultar documentos"],
          ["ver_pdf", "Ver / descargar PDF"],
        ],
        movimientos: [
          ["consultar", "Consultar movimientos"],
          ["exportar_pdf", "Exportar PDF"],
          ["exportar_excel", "Exportar Excel"],
        ],
        inventario: [
          ["consultar", "Consultar inventario"],
          ["crear_inventario", "Crear inventario"],
          ["guardar_conteo", "Guardar conteo"],
          ["ver_ajustes", "Ver ajustes"],
          ["exportar_pdf", "Exportar PDF"],
          ["exportar_excel", "Exportar Excel"],
        ],
      },
    };

    const state = {
      me: null,
      users: [],
      roles: [],
      editId: null,
    };

    const $ = (id) => document.getElementById(id);

    function setMsg(text, ok = false) {
      const el = $("form-msg");
      el.textContent = text || "";
      el.className = `msg full ${ok ? "ok" : "err"}`;
    }

    async function api(path, opts = {}) {
      const resp = await fetch(path, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
        ...opts,
      });
      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error(txt || `HTTP ${resp.status}`);
      }
      return resp.json();
    }

    function renderModulos() {
      const box = $("modulos-box");
      box.innerHTML = MODULOS.map(([k, lbl]) =>
        `<label><input type="checkbox" data-modulo="${k}" /> ${lbl}</label>`
      ).join("");
      document.querySelectorAll("input[data-modulo]").forEach((el) => {
        el.addEventListener("change", () => renderPaneles());
      });
      renderPaneles();
    }

    function renderPaneles() {
      // Guardar estado actual de paneles antes de re-renderizar
      const estadoPaneles = {};
      document.querySelectorAll("input[data-panel-modulo][data-panel]").forEach((el) => {
        const key = `${el.getAttribute("data-panel-modulo")}::${el.getAttribute("data-panel")}`;
        estadoPaneles[key] = el.checked;
      });

      const box = $("paneles-box");
      const modulosSeleccionados = selectedModulos();
      const html = modulosSeleccionados
        .filter((m) => !!PANELES_POR_MODULO[m])
        .map((modulo) => {
          const checks = PANELES_POR_MODULO[modulo]
            .map(([k, lbl]) => `<label><input type="checkbox" data-panel-modulo="${modulo}" data-panel="${k}" /> ${lbl}</label>`)
            .join("");
          return `<div class="paneles-group"><h4>${modulo.toUpperCase()}</h4><div class="checks">${checks}</div></div>`;
        })
        .join("");

      box.innerHTML = html || '<div class="muted">Seleccione modulo(s) para configurar paneles.</div>';

      // Restaurar estado previo de paneles
      document.querySelectorAll("input[data-panel-modulo][data-panel]").forEach((el) => {
        const key = `${el.getAttribute("data-panel-modulo")}::${el.getAttribute("data-panel")}`;
        if (estadoPaneles[key]) el.checked = true;
        el.addEventListener("change", () => renderAcciones());
      });

      renderAcciones();
    }

    function renderAcciones() {
      // Guardar estado actual de acciones antes de re-renderizar
      const estadoAcciones = {};
      document.querySelectorAll("input[data-accion-modulo][data-accion-panel][data-accion]").forEach((el) => {
        const key = `${el.getAttribute("data-accion-modulo")}::${el.getAttribute("data-accion-panel")}::${el.getAttribute("data-accion")}`;
        estadoAcciones[key] = el.checked;
      });

      const box = $("acciones-box");
      const modulosSeleccionados = selectedModulos();
      const html = modulosSeleccionados
        .filter((modulo) => !!ACCIONES_POR_MODULO_PANEL[modulo])
        .map((modulo) => {
          const panelesSeleccionados = Array.from(document.querySelectorAll(`input[data-panel-modulo="${modulo}"]:checked`))
            .map((el) => el.getAttribute("data-panel"));

          const bloquesPanel = panelesSeleccionados
            .filter((panel) => !!ACCIONES_POR_MODULO_PANEL[modulo][panel])
            .map((panel) => {
              const checks = ACCIONES_POR_MODULO_PANEL[modulo][panel]
                .map(([accion, lbl]) => `<label><input type="checkbox" data-accion-modulo="${modulo}" data-accion-panel="${panel}" data-accion="${accion}" /> ${lbl}</label>`)
                .join("");
              return `<div class="acciones-group"><h5>${modulo} / ${panel}</h5><div class="checks">${checks}</div></div>`;
            })
            .join("");

          return bloquesPanel;
        })
        .join("");

      box.innerHTML = html || '<div class="muted">Seleccione paneles para configurar acciones.</div>';

      // Restaurar estado previo de acciones
      document.querySelectorAll("input[data-accion-modulo][data-accion-panel][data-accion]").forEach((el) => {
        const key = `${el.getAttribute("data-accion-modulo")}::${el.getAttribute("data-accion-panel")}::${el.getAttribute("data-accion")}`;
        if (estadoAcciones[key]) el.checked = true;
      });
    }

    function renderRoles() {
      const box = $("roles-box");
      box.innerHTML = state.roles.map((r) =>
        `<label><input type="checkbox" data-rol="${r.id}" /> ${r.nombre}</label>`
      ).join("");
    }

    function selectedModulos() {
      return Array.from(document.querySelectorAll("input[data-modulo]:checked")).map((el) => el.getAttribute("data-modulo"));
    }

    function selectedRoles() {
      return Array.from(document.querySelectorAll("input[data-rol]:checked")).map((el) => Number(el.getAttribute("data-rol")));
    }

    function selectedPaneles() {
      const resultado = {};
      selectedModulos().forEach((modulo) => {
        if (!PANELES_POR_MODULO[modulo]) return;
        const marcados = Array.from(document.querySelectorAll(`input[data-panel-modulo="${modulo}"]:checked`))
          .map((el) => el.getAttribute("data-panel"));
        resultado[modulo] = marcados;
      });
      return resultado;
    }

    function selectedAcciones() {
      const out = {};
      const paneles = selectedPaneles();
      Object.keys(paneles || {}).forEach((modulo) => {
        if (!ACCIONES_POR_MODULO_PANEL[modulo]) return;
        const panelesModulo = paneles[modulo] || [];
        out[modulo] = {};
        panelesModulo.forEach((panel) => {
          if (!ACCIONES_POR_MODULO_PANEL[modulo][panel]) return;
          const marcadas = Array.from(
            document.querySelectorAll(`input[data-accion-modulo="${modulo}"][data-accion-panel="${panel}"]:checked`)
          ).map((el) => el.getAttribute("data-accion"));
          if (marcadas.length > 0) {
            out[modulo][panel] = marcadas;
          }
        });
        if (Object.keys(out[modulo]).length === 0) {
          delete out[modulo];
        }
      });
      return out;
    }

    function fillForm(u = null) {
      state.editId = u ? u.id : null;
      $("f_nombre").value = u?.nombre_apellido || "";
      $("f_dni").value = u?.dni || "";
      $("f_legajo").value = u?.legajo || "";
      $("f_correo").value = u?.correo || "";
      $("f_password").value = "";
      $("f_estado").value = u?.estado || "ACTIVO";
      $("f_tipo").value = u?.tipo_usuario || "CONSULTOR";

      document.querySelectorAll("input[data-modulo]").forEach((el) => {
        el.checked = !!u?.modulos?.includes(el.getAttribute("data-modulo"));
      });
      renderPaneles();
      Object.entries(u?.paneles || {}).forEach(([modulo, paneles]) => {
        (paneles || []).forEach((panel) => {
          const el = document.querySelector(`input[data-panel-modulo="${modulo}"][data-panel="${panel}"]`);
          if (el) el.checked = true;
        });
      });
      renderAcciones();
      Object.entries(u?.acciones || {}).forEach(([modulo, porPanel]) => {
        Object.entries(porPanel || {}).forEach(([panel, acciones]) => {
          (acciones || []).forEach((accion) => {
            const el = document.querySelector(
              `input[data-accion-modulo="${modulo}"][data-accion-panel="${panel}"][data-accion="${accion}"]`
            );
            if (el) el.checked = true;
          });
        });
      });
      document.querySelectorAll("input[data-rol]").forEach((el) => {
        const id = Number(el.getAttribute("data-rol"));
        el.checked = !!u?.roles?.some((r) => Number(r.id) === id);
      });

      $("btn-save").textContent = u ? "Guardar cambios" : "Crear usuario";
      $("btn-cancel").style.display = u ? "inline-block" : "none";
      setMsg("");
    }

    function badges(items) {
      return (items || []).map((x) => `<span class="badge">${x}</span>`).join("");
    }

    function badgesPaneles(paneles) {
      const chunks = [];
      Object.entries(paneles || {}).forEach(([modulo, lista]) => {
        chunks.push(`<span class="badge">${modulo}: ${(lista || []).length}</span>`);
      });
      return chunks.join("");
    }

    function badgesAcciones(acciones) {
      const chunks = [];
      Object.entries(acciones || {}).forEach(([modulo, porPanel]) => {
        Object.entries(porPanel || {}).forEach(([panel, lista]) => {
          chunks.push(`<span class="badge">${modulo}/${panel}: ${(lista || []).length}</span>`);
        });
      });
      return chunks.join("");
    }

    function renderUsers() {
      const tb = $("users-body");
      tb.innerHTML = state.users.map((u) => {
        const modulos = badges(u.modulos || []);
        const paneles = badgesPaneles(u.paneles || {});
        const acciones = badgesAcciones(u.acciones || {});
        const roles = badges((u.roles || []).map((r) => r.nombre));
        return `
          <tr>
            <td>${u.id}</td>
            <td>
              <div><strong>${u.nombre_apellido || ""}</strong></div>
              <div class="muted">${u.correo || ""}</div>
              <div class="muted">Legajo: ${u.legajo || "-"} | DNI: ${u.dni || "-"}</div>
            </td>
            <td>${u.tipo_usuario || ""}</td>
            <td>${u.estado || ""}${u.bloqueado ? " / BLOQUEADO" : ""}</td>
            <td>
              <span class="muted" id="pwd-${u.id}">Protegida</span>
              <button class="btn" id="btn-pwd-${u.id}" data-visible="0" onclick="togglePwd(${u.id})">Ver</button>
            </td>
            <td>${modulos}</td>
            <td>${paneles}</td>
            <td>${acciones}</td>
            <td>${roles}</td>
            <td>
              <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <button class="btn" onclick="editUser(${u.id})">Editar</button>
                <button class="btn warn" onclick="toggleBlock(${u.id}, ${u.bloqueado ? "false" : "true"})">${u.bloqueado ? "Desbloquear" : "Bloquear"}</button>
                <button class="btn" onclick="toggleState(${u.id}, '${u.estado === "ACTIVO" ? "INACTIVO" : "ACTIVO"}')">${u.estado === "ACTIVO" ? "Desactivar" : "Activar"}</button>
                <button class="btn danger" onclick="resetPwd(${u.id})">Restablecer clave</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function renderAccess(rows) {
      const tb = $("access-body");
      tb.innerHTML = rows.map((r) => `
        <tr>
          <td>${r.created_at || ""}</td>
          <td>${r.evento || ""}</td>
          <td>${r.nombre_apellido || r.username_input || ""}</td>
          <td>${r.detalle || ""}</td>
          <td>${r.ip || ""}</td>
        </tr>
      `).join("");
    }

    async function loadAll() {
      const me = await api("/me", { method: "GET", headers: {} });
      if (!me.autenticado || me.tipo_usuario !== "ADMINISTRADOR") {
        window.location.href = "/";
        return;
      }
      state.me = me;
      state.roles = await api("/admin/roles_funcionales", { method: "GET", headers: {} });
      renderRoles();
      state.users = await api("/admin/usuarios", { method: "GET", headers: {} });
      renderUsers();
      renderAccess(await api("/admin/accesos?limit=100", { method: "GET", headers: {} }));
      fillForm(null);
    }

    async function editUser(id) {
      const u = state.users.find((x) => x.id === id);
      if (!u) return;
      fillForm(u);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function toggleState(id, estado) {
      await api(`/admin/usuarios/${id}/estado`, { method: "POST", body: JSON.stringify({ estado }) });
      await loadAll();
    }

    async function toggleBlock(id, bloqueado) {
      await api(`/admin/usuarios/${id}/bloqueo`, { method: "POST", body: JSON.stringify({ bloqueado }) });
      await loadAll();
    }

    async function resetPwd(id) {
      const password = prompt("Nueva contrasena (vacio para generar temporal):", "");
      const data = await api(`/admin/usuarios/${id}/reset_password`, {
        method: "POST",
        body: JSON.stringify({ password: password || "", generar_automatica: !password }),
      });
      alert(`Contrasena restablecida: ${data.password || "(sin retorno)"}`);
      await loadAll();
    }

    async function togglePwd(id) {
      const out = document.getElementById(`pwd-${id}`);
      const btn = document.getElementById(`btn-pwd-${id}`);
      if (!out || !btn) return;

      if (btn.dataset.visible === "1") {
        out.textContent = "Protegida";
        btn.dataset.visible = "0";
        btn.textContent = "Ver";
        return;
      }

      const data = await api(`/admin/usuarios/${id}/password`);
      if (!data.password) {
        alert(data.mensaje || "No disponible");
        return;
      }
      out.textContent = data.password;
      btn.dataset.visible = "1";
      btn.textContent = "Ocultar";
    }

    window.editUser = editUser;
    window.toggleState = toggleState;
    window.toggleBlock = toggleBlock;
    window.togglePwd = togglePwd;
    window.resetPwd = resetPwd;

    $("btn-cancel").addEventListener("click", () => fillForm(null));

    $("user-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      setMsg("");
      const payload = {
        nombre_apellido: $("f_nombre").value.trim(),
        dni: $("f_dni").value.trim(),
        legajo: $("f_legajo").value.trim(),
        correo: $("f_correo").value.trim(),
        password: $("f_password").value,
        estado: $("f_estado").value,
        tipo_usuario: $("f_tipo").value,
        modulos: selectedModulos(),
        paneles: selectedPaneles(),
        acciones: selectedAcciones(),
        roles: selectedRoles(),
      };

      try {
        let r;
        if (state.editId) {
          r = await api(`/admin/usuarios/${state.editId}`, {
            method: "PUT",
            body: JSON.stringify(payload),
          });
          if (r.error) throw new Error(r.error);
          setMsg("Usuario actualizado", true);
        } else {
          r = await api("/admin/usuarios", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          if (r.error) throw new Error(r.error);
          setMsg(r.password_temporal ? `Usuario creado. Clave temporal: ${r.password_temporal}` : "Usuario creado", true);
        }
        await loadAll();
      } catch (err) {
        setMsg(String(err.message || err));
      }
    });

    renderModulos();
    loadAll().catch(() => { window.location.href = "/"; });
  </script>
</body>
</html>

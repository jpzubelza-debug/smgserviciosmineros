<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Principal - Dashboard Operaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0f172a;
      --panel: rgba(255, 255, 255, 0.16);
      --panel-strong: rgba(255, 255, 255, 0.25);
      --border: rgba(255, 255, 255, 0.35);
      --text: #f8fafc;
      --muted: #dbe7ff;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
      --danger: #f97316;
      --shadow: 0 24px 50px rgba(2, 6, 23, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, #22d3ee 0%, transparent 34%),
        radial-gradient(circle at 82% 20%, #38bdf8 0%, transparent 30%),
        radial-gradient(circle at 80% 80%, #f59e0b 0%, transparent 28%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 48%, #0b1120 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(50px);
      opacity: 0.5;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate;
    }

    body::before {
      width: 320px;
      height: 320px;
      background: rgba(34, 197, 94, 0.25);
      top: -80px;
      left: -90px;
    }

    body::after {
      width: 360px;
      height: 360px;
      background: rgba(14, 165, 233, 0.25);
      bottom: -120px;
      right: -80px;
      animation-delay: 0.8s;
    }

    .menu-shell {
      width: min(1040px, 94vw);
      padding: clamp(18px, 3vw, 28px);
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(145deg, var(--panel), rgba(255, 255, 255, 0.08));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      position: relative;
      z-index: 1;
    }

    .headline {
      margin: 0 0 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3.4vw, 2.4rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      letter-spacing: 0.2px;
    }

    .live-chip {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #dcfce7;
      border: 1px solid rgba(134, 239, 172, 0.45);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(16, 185, 129, 0.2));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .menu-grid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .menu-btn {
      display: block;
      width: 100%;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06));
      color: #f8fbff;
      border-radius: 18px;
      padding: 20px 18px;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      overflow: hidden;
      isolation: isolate;
      min-height: 118px;
    }

    .menu-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.14), transparent 50%, rgba(255, 255, 255, 0.08));
      transform: translateX(-35%);
      transition: transform 0.35s ease;
      z-index: -1;
    }

    .menu-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow: 0 16px 28px rgba(2, 6, 23, 0.28), inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.08));
    }

    .menu-btn:hover::before {
      transform: translateX(0);
    }

    .menu-btn:active {
      transform: translateY(-1px) scale(0.99);
    }

    .menu-btn strong {
      display: block;
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .menu-btn span {
      display: block;
      margin-top: 6px;
      font-size: 0.9rem;
      color: #d9ecff;
      opacity: 0.95;
      line-height: 1.35;
    }

    .menu-btn.logistica {
      border-color: rgba(14, 165, 233, 0.75);
      background: linear-gradient(155deg, rgba(14, 165, 233, 0.28), rgba(14, 165, 233, 0.1));
    }

    .menu-btn.logistica::after {
      content: "Disponible";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: #cffafe;
      background: rgba(2, 132, 199, 0.35);
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 999px;
      padding: 3px 8px;
      letter-spacing: 0.2px;
    }

    .menu-btn:not(.logistica) {
      cursor: default;
      opacity: 0.88;
    }

    .menu-btn:not(.logistica)::after {
      content: "Proximamente";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: #ffedd5;
      background: rgba(194, 65, 12, 0.3);
      border: 1px solid rgba(251, 146, 60, 0.5);
      border-radius: 999px;
      padding: 3px 8px;
      letter-spacing: 0.2px;
    }

    .footnote {
      margin-top: 14px;
      font-size: 0.86rem;
      color: rgba(236, 247, 255, 0.85);
      letter-spacing: 0.15px;
    }

    @media (max-width: 900px) {
      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        overflow: auto;
        padding: 16px 0;
      }

      .menu-shell {
        width: min(560px, 94vw);
        border-radius: 22px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      .menu-btn {
        min-height: auto;
      }

      .live-chip {
        margin-top: 2px;
      }
    }

    @keyframes drift {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(12px) scale(1.06); }
    }
  </style>
</head>
<body>
  <main class="menu-shell">
    <header class="headline">
      <div class="title-wrap">
        <h1>Menu Principal</h1>
        <p>Centro de acceso para los modulos operativos.</p>
      </div>
      <div class="live-chip">Sistema Operativo Activo</div>
    </header>

    <section class="menu-grid">
      <a class="menu-btn logistica" href="http://127.0.0.1:8000/dashboard">
        <strong>Logistica</strong>
        <span>Acceso al dashboard completo de viajes, personal, vehiculos y ordenes.</span>
      </a>

      <button class="menu-btn" type="button" aria-disabled="true">
        <strong>Recursos Humanos</strong>
        <span>Modulo de gestion de personal y administracion de habilitaciones.</span>
      </button>

      <button class="menu-btn" type="button" aria-disabled="true">
        <strong>Mantenimiento</strong>
        <span>Control de estado tecnico, checklists y planificacion de mantenimientos.</span>
      </button>

      <button class="menu-btn" type="button" aria-disabled="true">
        <strong>Operaciones</strong>
        <span>Seguimiento operativo integral, productividad y alertas en tiempo real.</span>
      </button>

      <button class="menu-btn" type="button" aria-disabled="true">
        <strong>Almacen</strong>
        <span>Gestion de stock, ingresos, egresos y trazabilidad de materiales.</span>
      </button>

      <button class="menu-btn" type="button" aria-disabled="true">
        <strong>Compras</strong>
        <span>Solicitudes, aprobaciones y control del circuito de adquisiciones.</span>
      </button>
    </section>

    <p class="footnote">Solo Logistica se encuentra habilitado en esta version.</p>
  </main>
</body>
</html>

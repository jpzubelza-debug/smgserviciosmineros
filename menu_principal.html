<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Principal - Dashboard Operaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --bg-3: #0b1120;
      --panel: rgba(15, 23, 42, 0.66);
      --line: rgba(148, 163, 184, 0.35);
      --text: #e2e8f0;
      --muted: #bfdbfe;
      --ok-1: #22c55e;
      --ok-2: #16a34a;
      --shadow: 0 12px 30px rgba(2, 6, 23, 0.4);
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      position: relative;
      overflow-x: hidden;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('/Imagenes/fondo_de_pantalla_dashboard.PNG') center center / cover no-repeat;
      opacity: 0.66;
      pointer-events: none;
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.2), transparent 48%),
        radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.18), transparent 45%);
    }

    .menu-shell {
      width: min(1040px, 100%);
      padding: clamp(18px, 3vw, 28px);
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
      z-index: 2;
    }

    .headline {
      margin: 0 0 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.55);
      padding: 8px;
      object-fit: contain;
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.35);
      flex: 0 0 70px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3.4vw, 2.4rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.2px;
    }

    .live-chip {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #dcfce7;
      border: 1px solid rgba(34, 197, 94, 0.45);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.24), rgba(22, 163, 74, 0.22));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .user-chip {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #e2e8f0;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.55);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }

    .menu-grid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .menu-btn {
      display: block;
      width: 100%;
      position: relative;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.55);
      color: #f8fbff;
      border-radius: 12px;
      padding: 20px 18px;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      overflow: hidden;
      isolation: isolate;
      min-height: 118px;
    }

    .menu-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.14), transparent 50%, rgba(255, 255, 255, 0.08));
      transform: translateX(-35%);
      transition: transform 0.35s ease;
      z-index: -1;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(147, 197, 253, 0.7);
      box-shadow: 0 0 12px rgba(59,130,246,0.5);
      background: rgba(15, 23, 42, 0.62);
    }

    .menu-btn:hover::before {
      transform: translateX(0);
    }

    .menu-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .menu-btn strong {
      display: block;
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .menu-btn span {
      display: block;
      margin-top: 6px;
      font-size: 0.9rem;
      color: #d9ecff;
      opacity: 0.95;
      line-height: 1.35;
    }

    .menu-btn.logistica {
      border-color: rgba(59,130,246,0.65);
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.32), rgba(2, 132, 199, 0.2));
    }

    .menu-btn.logistica::after {
      content: "Disponible";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: #cffafe;
      background: rgba(2, 132, 199, 0.35);
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 999px;
      padding: 3px 8px;
      letter-spacing: 0.2px;
    }

    .menu-btn:not(.logistica) {
      cursor: default;
      opacity: 0.88;
    }

    .menu-btn:not(.logistica)::after {
      content: "Proximamente";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: #ffedd5;
      background: rgba(194, 65, 12, 0.3);
      border: 1px solid rgba(251, 146, 60, 0.5);
      border-radius: 999px;
      padding: 3px 8px;
      letter-spacing: 0.2px;
    }

    .menu-btn.logistica:hover {
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.46), rgba(2, 132, 199, 0.28));
    }

    .footnote {
      margin-top: 14px;
      font-size: 0.86rem;
      color: rgba(236, 247, 255, 0.85);
      letter-spacing: 0.15px;
    }

    @media (max-width: 900px) {
      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .brand-logo {
        width: 56px;
        height: 56px;
        flex-basis: 56px;
      }
    }

    @media (max-width: 620px) {
      body {
        overflow: auto;
        padding: 16px;
      }

      .menu-shell {
        width: min(560px, 100%);
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      .headline {
        align-items: flex-start;
      }

      .menu-btn {
        min-height: auto;
      }

      .live-chip {
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="bg-blur"></div>
  <main class="menu-shell">
    <header class="headline">
      <div class="brand-wrap">
        <img class="brand-logo" src="/Imagenes/09-smg.png" alt="Logo SMG" />
        <div class="title-wrap">
          <h1>Menu Principal</h1>
          <p>Centro de acceso para los modulos operativos.</p>
        </div>
      </div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <div class="user-chip" id="user-chip">Usuario</div>
        <div class="live-chip">Sistema Operativo Activo</div>
      </div>
    </header>

    <section class="menu-grid" id="menu-grid">
    </section>

    <p class="footnote" id="footnote">Se muestran solo los modulos asignados al usuario autenticado.</p>
  </main>
  <script>
    const MODULOS = [
      {
        key: "logistica",
        titulo: "Logistica",
        descripcion: "Acceso al dashboard completo de viajes, personal, vehiculos y ordenes.",
        href: "/dashboard",
        habilitado: true,
      },
      {
        key: "almacen",
        titulo: "Almacen",
        descripcion: "Gestion de stock, ingresos, egresos y trazabilidad de materiales.",
        href: "/almacen",
        habilitado: true,
      },
      {
        key: "operaciones",
        titulo: "Operaciones",
        descripcion: "Seguimiento operativo integral, productividad y alertas en tiempo real.",
        href: "",
        habilitado: false,
      },
      {
        key: "compras",
        titulo: "Compras",
        descripcion: "Solicitudes, aprobaciones y control del circuito de adquisiciones.",
        href: "",
        habilitado: false,
      },
      {
        key: "rrhh",
        titulo: "Recursos Humanos",
        descripcion: "Modulo de gestion de personal y administracion de habilitaciones.",
        href: "",
        habilitado: false,
      },
      {
        key: "mantenimiento",
        titulo: "Mantenimiento",
        descripcion: "Control de estado tecnico, checklists y planificacion de mantenimientos.",
        href: "",
        habilitado: false,
      },
      {
        key: "dashboard_ejecutivo",
        titulo: "Dashboard Ejecutivo",
        descripcion: "Indicadores estrategicos y seguimiento de performance.",
        href: "",
        habilitado: false,
      },
      {
        key: "administracion",
        titulo: "Administracion",
        descripcion: "Gestion de usuarios, roles, permisos y trazabilidad de accesos.",
        href: "/administracion",
        habilitado: true,
      },
    ];

    function crearCard(modulo) {
      const baseClass = modulo.habilitado ? "menu-btn logistica" : "menu-btn";
      const html = `<strong>${modulo.titulo}</strong><span>${modulo.descripcion}</span>`;

      if (modulo.habilitado && modulo.href) {
        const a = document.createElement("a");
        a.className = baseClass;
        a.href = modulo.href;
        a.innerHTML = html;
        return a;
      }

      const btn = document.createElement("button");
      btn.className = baseClass;
      btn.type = "button";
      btn.setAttribute("aria-disabled", "true");
      btn.innerHTML = html;
      return btn;
    }

    async function cargarMenu() {
      try {
        const resp = await fetch("/me", { credentials: "same-origin" });
        const me = await resp.json();
        if (!me || !me.autenticado) {
          window.location.href = "/login";
          return;
        }

        const grid = document.getElementById("menu-grid");
        const foot = document.getElementById("footnote");
        const userChip = document.getElementById("user-chip");

        const modulosAsignados = new Set(Array.isArray(me.modulos) ? me.modulos : []);
        const visibles = MODULOS.filter((m) => modulosAsignados.has(m.key));

        userChip.textContent = `${me.nombre_apellido || me.usuario || "Usuario"} | ${me.tipo_usuario || ""}`;
        grid.innerHTML = "";
        visibles.forEach((m) => grid.appendChild(crearCard(m)));

        if (visibles.length === 0) {
          foot.textContent = "No hay modulos asignados para este usuario. Contacte al Administrador.";
        } else {
          foot.textContent = "Se muestran solo los modulos asignados al usuario autenticado.";
        }
      } catch (err) {
        window.location.href = "/login";
      }
    }

    cargarMenu();
  </script>
</body>
</html>

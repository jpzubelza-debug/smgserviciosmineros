services:
  - type: web
    name: dashboard-operaciones
    env: python
    buildCommand: bash ./build.sh
    startCommand: bash ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_DIR
        value: /var/data
      - key: PASSWORD_ENCRYPTION_KEY
        sync: false
    disk:
      name: dashboard-data
      mountPath: /var/data
      sizeGB: 1

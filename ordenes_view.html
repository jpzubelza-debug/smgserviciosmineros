<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ordenes de Salida</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b, #0b1120);
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

.bg-photo {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: url('/Imagenes/fondo_de_pantalla_dashboard.PNG') center center / cover no-repeat;
  opacity: 0.66;
  pointer-events: none;
}

.bg-blur {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.2), transparent 48%),
    radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.18), transparent 45%);
}

header {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.35);
  background: rgba(15, 23, 42, 0.66);
}

.container {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 16px 20px;
}

.logo-corner {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 3;
  padding: 0;
}

.logo-corner img {
  display: block;
  width: 195px;
  max-width: 38vw;
  height: auto;
}

.logo-box img { filter: none; }

.logo-text {
  color: #ffffff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

.selector-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: end;
}

.selector-card select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(148, 163, 184, 0.45);
  background: rgba(2, 6, 23, 0.55);
  color: #e2e8f0;
}

.selector-tools {
  margin-top: 10px;
  display: grid;
  gap: 8px;
}

.selector-tools input[type="text"] {
  width: 100%;
  padding: 9px 10px;
  border-radius: 8px;
  border: 1px solid rgba(148, 163, 184, 0.45);
  background: rgba(2, 6, 23, 0.55);
  color: #e2e8f0;
  box-sizing: border-box;
}

.check-inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #bfdbfe;
  font-size: 13px;
}

.check-inline input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #2563eb;
}

select option,
select optgroup {
  background: #0f2237;
  color: #eef4ff;
}

select option:checked {
  background: #2f6fca;
  color: #ffffff;
}

.card {
  background: rgba(15, 23, 42, 0.66);
  border: 1px solid rgba(148, 163, 184, 0.35);
  box-shadow: 0 12px 30px rgba(2, 6, 23, 0.4);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 14px;
  transition: none;
}

.card:hover {
  transform: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.item {
  background: rgba(2, 6, 23, 0.45);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 13px;
  border: 1px solid rgba(148, 163, 184, 0.35);
}

.title {
  font-weight: bold;
  color: #93c5fd;
  margin-bottom: 8px;
}

.bloque {
  margin-top: 14px;
  padding: 12px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  border-radius: 10px;
  background: rgba(15, 23, 42, 0.45);
}

.bloque h3 {
  margin: 0 0 10px;
  color: #bfdbfe;
}

.solicitud-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.solicitud-horas-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.solicitud-resumen-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

@media (max-width: 820px) {
  .solicitud-resumen-row,
  .solicitud-horas-row {
    grid-template-columns: 1fr;
  }
}

.solicitud-field {
  background: #0b1220;
  border-radius: 8px;
  padding: 8px 10px;
}

.solicitud-field label {
  display: block;
  margin-bottom: 6px;
  color: #93c5fd;
  font-size: 12px;
}

.solicitud-field input {
  width: 100%;
  padding: 8px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

.solicitud-field textarea {
  width: 100%;
  padding: 8px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
  min-height: 88px;
  resize: vertical;
}

.solicitud-span-2 {
  grid-column: 1 / -1;
}

.asignacion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.asignacion-field {
  background: #0b1220;
  border-radius: 8px;
  padding: 8px 10px;
}

.asignacion-field label {
  display: block;
  margin-bottom: 6px;
  color: #93c5fd;
  font-size: 12px;
}

.asignacion-field input,
.asignacion-field select,
.asignacion-field textarea {
  width: 100%;
  padding: 8px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

.asignacion-field textarea {
  min-height: 72px;
  resize: vertical;
}

.asignacion-span-2 {
  grid-column: span 2;
}

.viaticos-list {
  display: grid;
  gap: 8px;
}

.viaticos-row {
  display: grid;
  grid-template-columns: minmax(230px, 2.8fr) minmax(95px, 0.8fr) auto;
  gap: 8px;
}

.viaticos-row .acomp-nombre-editable {
  width: 100%;
  padding: 8px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

.btn-remove-acomp {
  margin: 0;
  padding: 6px 8px;
  min-width: 58px;
  font-size: 12px;
  line-height: 1.1;
  background: #b91c1c;
}

.btn-remove-acomp:hover {
  background: #991b1b;
}

.btn-add-acomp:disabled,
.btn-remove-acomp:disabled,
button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  box-shadow: none;
}

.btn-add-acomp:disabled:hover,
.btn-remove-acomp:disabled:hover,
button:disabled:hover {
  background: inherit;
}

.asignacion-field input:disabled,
.asignacion-field select:disabled,
.asignacion-field textarea:disabled,
.solicitud-field input:disabled,
.solicitud-field select:disabled,
.solicitud-field textarea:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.btn-add-acomp {
  margin-top: 8px;
  background: #1d4ed8;
}

.btn-add-acomp:hover {
  background: #1e40af;
}

.seguimiento-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

.seguimiento-table th,
.seguimiento-table td {
  border: 1px solid #334155;
  padding: 8px;
  font-size: 13px;
}

.seguimiento-table th {
  background: #1e293b;
  color: #bfdbfe;
  text-align: left;
}

.total-extra-box {
  margin-top: 6px;
  width: 100%;
  padding: 6px;
  border: 1px solid #60a5fa;
  border-radius: 6px;
  background: #0b1220;
  color: #bfdbfe;
  font-weight: 700;
  box-sizing: border-box;
}

.seguimiento-table input {
  width: 100%;
  padding: 7px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

.seguimiento-checks {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.seguimiento-check-item {
  background: #0b1220;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 8px 10px;
}

.seguimiento-check-item label {
  display: block;
  margin-bottom: 6px;
  color: #93c5fd;
  font-size: 12px;
}

.seguimiento-check-item select {
  width: 100%;
  padding: 8px;
  border: 1px solid #475569;
  border-radius: 6px;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

.adjuntos-grid {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px;
}

.adjunto-item {
  background: #0b1220;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 8px 10px;
}

.adjunto-item label {
  display: block;
  margin-bottom: 6px;
  color: #93c5fd;
  font-size: 12px;
}

.adjunto-item input[type="file"] {
  width: 100%;
}

.adjunto-link {
  display: inline-block;
  margin-top: 8px;
  color: #93c5fd;
  text-decoration: underline;
  font-size: 13px;
}

.adjunto-link:hover {
  color: #bfdbfe;
}

.cierre-footer {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.btn-imprimir {
  background: linear-gradient(135deg, #0e7a46, #047857);
}

.btn-imprimir:hover {
  box-shadow: 0 0 12px rgba(5,150,105,0.7);
}

@media print {
  .bg-photo, .bg-blur, .logo-corner, header, .selector-card, .adjuntos-grid,
  .cierre-footer, .btn-add-acomp, .btn-remove-acomp {
    display: none !important;
  }

  body {
    background: #fff !important;
    color: #000 !important;
  }

  .container {
    max-width: 100%;
    margin: 0;
    padding: 0;
  }

  .card, .bloque {
    background: #fff !important;
    border: 1px solid #ccc !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    break-inside: avoid;
  }

  .card:hover {
    transform: none !important;
  }

  .solicitud-field input,
  .asignacion-field input,
  .asignacion-field select,
  .asignacion-field textarea,
  .seguimiento-table input,
  .seguimiento-check-item select,
  .viaticos-row input,
  .nombre-editable {
    background: #fff !important;
    color: #000 !important;
    border: 1px solid #999 !important;
  }

  .title { color: #000 !important; }
  .bloque h3 { color: #000 !important; }
  label { color: #333 !important; }
  .item { background: #f5f5f5 !important; color: #000 !important; border: 1px solid #ccc !important; }
  .solicitud-field label, .asignacion-field label { color: #333 !important; }

  .seguimiento-checks,
  .seguimiento-table th:last-child,
  .seguimiento-table td:last-child {
    display: none !important;
  }

  .seguimiento-table {
    table-layout: fixed;
  }

  .seguimiento-table th:nth-child(1),
  .seguimiento-table td:nth-child(1) {
    width: 8% !important;
  }

  .seguimiento-table th:nth-child(2),
  .seguimiento-table td:nth-child(2) {
    width: 14% !important;
  }

  .seguimiento-table th:nth-child(3),
  .seguimiento-table td:nth-child(3),
  .seguimiento-table th:nth-child(4),
  .seguimiento-table td:nth-child(4) {
    width: 12% !important;
  }

  .seguimiento-table th:nth-child(5),
  .seguimiento-table td:nth-child(5) {
    width: 54% !important;
  }

  .seguimiento-table td:nth-child(3) input,
  .seguimiento-table td:nth-child(4) input,
  .seguimiento-table td:nth-child(5) input {
    color: transparent !important;
    -webkit-text-fill-color: transparent !important;
    font-size: 0 !important;
    text-shadow: none !important;
  }

  .seguimiento-table td:nth-child(3) input::placeholder,
  .seguimiento-table td:nth-child(4) input::placeholder,
  .seguimiento-table td:nth-child(5) input::placeholder {
    color: transparent !important;
  }

  .seguimiento-table td:nth-child(3) input::-webkit-calendar-picker-indicator,
  .seguimiento-table td:nth-child(4) input::-webkit-calendar-picker-indicator,
  .seguimiento-table td:nth-child(3) input::-webkit-inner-spin-button,
  .seguimiento-table td:nth-child(4) input::-webkit-inner-spin-button,
  .seguimiento-table td:nth-child(3) input::-webkit-clear-button,
  .seguimiento-table td:nth-child(4) input::-webkit-clear-button {
    opacity: 0 !important;
    display: none !important;
  }
}

.cierre-msg {
  color: #bfdbfe;
  font-size: 13px;
}

label {
  color: #94a3b8;
}

pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  background: #020617;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 10px;
  font-size: 12px;
}

button {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  transition: 0.2s;
}

button:hover {
  box-shadow: 0 0 12px rgba(59,130,246,0.6);
  transform: scale(1.05);
}
</style>
</head>
<body>
<div class="bg-photo"></div>
<div class="bg-blur"></div>
<div class="logo-corner logo-box">
  <img src="/Imagenes/09-smg.png" alt="Logo SMG">
</div>
<header>
  <h1>Ordenes de Salida</h1>
  <p>Detalle completo de viajes asignados</p>
</header>

<div class="container">
  <div class="card selector-card">
    <div>
      <label for="selector-os">Seleccionar Orden de Salida</label>
      <select id="selector-os"></select>
      <div class="selector-tools">
        <label class="check-inline" for="filtro-cerradas">
          <input id="filtro-cerradas" type="checkbox">
          Solo OS cerradas
        </label>
        <input id="busqueda-os" type="text" placeholder="Buscar por Nro OS, ID viaje, solicitante o destino">
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="btn-recargar" type="button">Recargar</button>
      <button id="btn-imprimir" type="button" class="btn-imprimir">&#128438; Imprimir</button>
    </div>
  </div>
  <div id="listado"></div>
</div>

<script>
let ordenesCache = [];
let ordenesFiltradas = [];
let nominaPersonal = [];
let nominaVehiculos = [];

function esc(valor) {
  const div = document.createElement("div");
  div.textContent = valor ?? "";
  return div.innerHTML;
}

function renderItems(obj) {
  return Object.entries(obj || {})
    .map(([k, v]) => {
      const valor = typeof v === "object" ? JSON.stringify(v, null, 2) : String(v ?? "");
      return `<div class="item"><label>${esc(k)}:</label><br>${esc(valor)}</div>`;
    })
    .join("");
}

function estaOrdenCerrada(orden) {
  const estadoOrden = String(orden?.estado || "").toUpperCase();
  const estadoViaje = String(orden?.viaje?.estado || "").toUpperCase();
  const cierreLogistica = (orden?.cierre_logistica && typeof orden.cierre_logistica === "object")
    ? orden.cierre_logistica
    : null;
  const cerradoFlag = String(cierreLogistica?.cerrado || "").toUpperCase() === "TRUE";
  const cerradoPorCierre = Boolean(cierreLogistica?.cerrado) || cerradoFlag || Boolean(cierreLogistica?.fecha_guardado);
  return cerradoPorCierre || estadoOrden.startsWith("CERRAD") || estadoViaje.startsWith("CERRAD");
}

function normalizarBusqueda(valor) {
  return String(valor || "").toLowerCase().trim();
}

function coincideBusquedaOrden(orden, termino) {
  if (!termino) {
    return true;
  }

  const solicitante = orden?.recursos?.datos_solicitante || orden?.viaje?.solicitante || "";
  const destino = orden?.recursos?.destino || orden?.viaje?.destino || "";
  const texto = [
    orden?.nro_orden || "",
    orden?.id_viaje || "",
    orden?.fecha_orden || "",
    solicitante,
    destino,
  ].join(" ").toLowerCase();

  return texto.includes(termino);
}

async function cargarNominaPersonal() {
  try {
    const res = await fetch("/personal");
    const data = await res.json();
    const nombres = Array.isArray(data)
      ? data.map((p) => String(p?.nombre || "").trim()).filter((n) => n.length > 0)
      : [];
    nominaPersonal = Array.from(new Set(nombres)).sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));
  } catch (error) {
    nominaPersonal = [];
    console.warn("No se pudo cargar la nómina de personal", error);
  }
}

async function cargarNominaVehiculos() {
  try {
    const res = await fetch("/vehiculos");
    const data = await res.json();
    const opciones = [];

    if (Array.isArray(data)) {
      data.forEach((v) => {
        const codigo = String(v?.codigo || "").trim();
        const dominio = String(v?.dominio || "").trim();
        const marca = String(v?.marca || "").trim();
        const modelo = String(v?.modelo || "").trim();

        if (codigo) {
          opciones.push(codigo);
        }
        if (dominio) {
          opciones.push(dominio);
        }
        const descripcion = [codigo, marca, modelo, dominio].filter((x) => x.length > 0).join(" | ");
        if (descripcion) {
          opciones.push(descripcion);
        }
      });
    }

    nominaVehiculos = Array.from(new Set(opciones)).sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));
  } catch (error) {
    nominaVehiculos = [];
    console.warn("No se pudo cargar la nómina de vehículos", error);
  }
}

function sumarDias(fechaBase, dias) {
  const base = new Date(`${fechaBase}T00:00:00`);
  if (Number.isNaN(base.getTime())) {
    return "";
  }
  base.setDate(base.getDate() + dias);
  return base.toISOString().slice(0, 10);
}

function renderFilasSeguimiento(duracionJornadas, fechaSalida = "", bloqueado = false) {
  const jornadas = Number.parseInt(duracionJornadas, 10);
  const total = Number.isFinite(jornadas) && jornadas > 0 ? jornadas : 1;
  const attrBloqueado = bloqueado ? "disabled" : "";

  let filas = "";
  for (let i = 1; i <= total; i += 1) {
    const fechaAuto = fechaSalida ? sumarDias(fechaSalida, i - 1) : "";
    filas += `
      <tr>
        <td>Dia ${i}</td>
        <td><input type="date" value="${esc(fechaAuto)}" ${attrBloqueado}></td>
        <td><input type="time" class="hs-inicio" ${attrBloqueado}></td>
        <td><input type="time" class="hs-final" ${attrBloqueado}></td>
        <td><input type="text" placeholder="Observaciones" ${attrBloqueado}></td>
        <td><input type="text" class="hs-acumuladas" value="0.00 hs | Extra: 0.00 hs" readonly></td>
      </tr>
    `;
  }

  return filas;
}

function renderFilasSeguimientoConDatos(duracionJornadas, fechaSalida = "", detalleDias = [], bloqueado = false) {
  const attrBloqueado = bloqueado ? "disabled" : "";
  const detalle = Array.isArray(detalleDias) ? detalleDias : [];
  if (detalle.length === 0) {
    return renderFilasSeguimiento(duracionJornadas, fechaSalida, bloqueado);
  }

  return detalle.map((fila, idx) => {
    const dia = Number.parseInt(fila?.dia, 10) || (idx + 1);
    const fecha = fila?.fecha || "";
    const hsInicio = fila?.hs_inicio || "";
    const hsFinal = fila?.hs_final || "";
    const observaciones = fila?.observaciones || "";
    const resumen = fila?.resumen_horas || "0.00 hs | Extra: 0.00 hs";
    const extraHoras = Number.isFinite(Number(fila?.extra_horas)) ? Number(fila?.extra_horas) : 0;

    return `
      <tr data-extra-horas="${esc(String(extraHoras))}">
        <td>Dia ${esc(String(dia))}</td>
        <td><input type="date" value="${esc(fecha)}" ${attrBloqueado}></td>
        <td><input type="time" class="hs-inicio" value="${esc(hsInicio)}" ${attrBloqueado}></td>
        <td><input type="time" class="hs-final" value="${esc(hsFinal)}" ${attrBloqueado}></td>
        <td><input type="text" placeholder="Observaciones" value="${esc(observaciones)}" ${attrBloqueado}></td>
        <td><input type="text" class="hs-acumuladas" value="${esc(resumen)}" readonly></td>
      </tr>
    `;
  }).join("");
}

function renderBloqueoOrdenCerrada() {
  return `
    <div class="card" style="margin-top:12px;border-left:4px solid #8c5b00;">
      <strong>Orden cerrada</strong><br>
      La información se muestra en modo solo lectura.
    </div>
  `;
}

function timeToMinutes(value) {
  if (!value || !value.includes(":")) {
    return null;
  }
  const [h, m] = value.split(":").map(Number);
  if (!Number.isFinite(h) || !Number.isFinite(m)) {
    return null;
  }
  return (h * 60) + m;
}

function actualizarHorasFila(fila) {
  const inicioInput = fila.querySelector(".hs-inicio");
  const finalInput = fila.querySelector(".hs-final");
  const salidaInput = fila.querySelector(".hs-acumuladas");

  if (!inicioInput || !finalInput || !salidaInput) {
    return;
  }

  const inicioMin = timeToMinutes(inicioInput.value);
  const finalMin = timeToMinutes(finalInput.value);

  if (inicioMin === null || finalMin === null) {
    fila.dataset.extraHoras = "0";
    salidaInput.value = "0.00 hs | Extra: 0.00 hs";
    actualizarTotalExtrasSeguimiento();
    return;
  }

  let minutos = finalMin - inicioMin;
  if (minutos < 0) {
    minutos += 24 * 60;
  }

  const horas = minutos / 60;
  const extra = Math.max(horas - 10, 0);
  fila.dataset.extraHoras = String(extra);
  salidaInput.value = `${horas.toFixed(2)} hs | Extra: ${extra.toFixed(2)} hs`;
  actualizarTotalExtrasSeguimiento();
}

function actualizarTotalExtrasSeguimiento() {
  const filas = document.querySelectorAll("#seguimiento-body tr");
  let totalExtra = 0;

  filas.forEach((fila) => {
    const extra = Number(fila.dataset.extraHoras || 0);
    if (Number.isFinite(extra)) {
      totalExtra += extra;
    }
  });

  const totalInput = document.getElementById("seguimiento-total-extra");
  if (totalInput) {
    totalInput.value = `${totalExtra.toFixed(2)} hs`;
  }
}

function activarCalculoHorasSeguimiento() {
  const filas = document.querySelectorAll("#seguimiento-body tr");
  filas.forEach((fila) => {
    const inicioInput = fila.querySelector(".hs-inicio");
    const finalInput = fila.querySelector(".hs-final");
    const salidaInput = fila.querySelector(".hs-acumuladas");
    if (inicioInput) {
      inicioInput.addEventListener("change", () => actualizarHorasFila(fila));
    }
    if (finalInput) {
      finalInput.addEventListener("change", () => actualizarHorasFila(fila));
    }

    const tieneResumenGuardado = Boolean((salidaInput?.value || "").trim());
    if (!tieneResumenGuardado) {
      actualizarHorasFila(fila);
    }
  });
  actualizarTotalExtrasSeguimiento();
}

function formatearSoloFecha(valor) {
  if (!valor) {
    return "";
  }
  return String(valor).slice(0, 10);
}

function calcularJornadas(fechaSalida, fechaLlegada) {
  if (!fechaSalida || !fechaLlegada) {
    return 1;
  }

  const salida = new Date(`${fechaSalida}T00:00:00`);
  const llegada = new Date(`${fechaLlegada}T00:00:00`);
  const msPorDia = 24 * 60 * 60 * 1000;
  const diferencia = Math.floor((llegada - salida) / msPorDia) + 1;
  return diferencia > 0 ? diferencia : 1;
}

function actualizarControlSegunFechas() {
  const salidaInput = document.getElementById("solicitud-fecha-salida");
  const llegadaInput = document.getElementById("solicitud-fecha-llegada");
  const duracionInput = document.getElementById("solicitud-duracion-jornadas");
  const seguimientoBody = document.getElementById("seguimiento-body");

  if (!salidaInput || !llegadaInput || !duracionInput || !seguimientoBody) {
    return;
  }

  if (salidaInput.value) {
    llegadaInput.min = salidaInput.value;
  } else {
    llegadaInput.min = "";
  }

  if (salidaInput.value && llegadaInput.value && llegadaInput.value < salidaInput.value) {
    llegadaInput.value = salidaInput.value;
  }

  const jornadas = calcularJornadas(salidaInput.value, llegadaInput.value);
  duracionInput.value = String(jornadas);
  seguimientoBody.innerHTML = renderFilasSeguimiento(jornadas, salidaInput.value, false);
  activarCalculoHorasSeguimiento();
}

  const checklistFile = document.getElementById("adjunto-checklist")?.files?.[0];
  const formularioFile = document.getElementById("adjunto-formulario")?.files?.[0];

  if (checklistFile) {
    formData.append("checklist_mantenimiento", checklistFile);
  }
  if (formularioFile) {
    formData.append("formulario_logistica_viaje", formularioFile);
  }

  try {
    if (msg) {
      msg.textContent = "Guardando cierre logístico...";
    }

    const res = await fetch(`/ordenes/${encodeURIComponent(orden.nro_orden)}/cierre`, {
      method: "POST",
      body: formData,
    });
    const result = await res.json();

    if (result.error) {
      if (msg) {
        msg.textContent = result.error;
      }
      return;
    }

    if (msg) {
      msg.textContent = "Cierre logístico guardado correctamente.";
    }

    await cargarOrdenes(String(orden.nro_orden || ""));
  } catch (error) {
    if (msg) {
      msg.textContent = "No se pudo guardar el cierre logístico.";
    }
    console.error(error);
  }
}

function renderOrdenSeleccionada(orden) {
  const cont = document.getElementById("listado");

  if (!orden) {
    cont.innerHTML = '<div class="card">No hay orden seleccionada.</div>';
    return;
  }

  const viaje = orden.viaje || {};
  const recursos = orden.recursos || {};
  const cierreLogistica = (orden.cierre_logistica && typeof orden.cierre_logistica === "object") ? orden.cierre_logistica : {};
  const cierreDatos = (cierreLogistica.datos && typeof cierreLogistica.datos === "object") ? cierreLogistica.datos : {};
  const bloqueado = estaOrdenCerrada(orden);
  const recursosVista = {
    ...recursos,
    ...(cierreDatos.solicitud || {}),
    ...(cierreDatos.asignacion || {}),
  };
  const controlSeguimiento = (cierreDatos.control_y_seguimiento && typeof cierreDatos.control_y_seguimiento === "object")
    ? cierreDatos.control_y_seguimiento
    : {};
  const detalleDias = Array.isArray(controlSeguimiento.detalle_dias) ? controlSeguimiento.detalle_dias : [];
  const cumpleProcedimiento = (controlSeguimiento.cumple_procedimiento || "NO").toString();
  const notaDesvios = (controlSeguimiento.nota_desvios || "NO").toString();
  const aplicaSanciones = (controlSeguimiento.aplica_sanciones || "NO").toString();
  const totalExtraHoras = controlSeguimiento.total_extra_horas || "0.00 hs";
  const adjuntos = (cierreLogistica.adjuntos && typeof cierreLogistica.adjuntos === "object") ? cierreLogistica.adjuntos : {};
  const checklistAdjunto = adjuntos.checklist_mantenimiento || "";
  const formularioAdjunto = adjuntos.formulario_logistica_viaje || "";
  const checklistUrl = checklistAdjunto ? `/Doc_Log_Viajes/${encodeURIComponent(checklistAdjunto)}` : "";
  const formularioUrl = formularioAdjunto ? `/Doc_Log_Viajes/${encodeURIComponent(formularioAdjunto)}` : "";

  const html = `
    <div class="card">
      <div class="title">${esc(orden.nro_orden || "SIN NUMERO")}</div>
      ${bloqueado ? renderBloqueoOrdenCerrada() : ""}
      <div class="grid">
        <div class="item"><label>Fecha Orden:</label><br>${esc(orden.fecha_orden || "")}</div>
        <div class="item"><label>ID Viaje:</label><br>${esc(orden.id_viaje || "")}</div>
        <div class="item"><label>Nro Orden:</label><br>${esc(orden.nro_orden || "")}</div>
        <div class="item"><label>Estado Viaje:</label><br>${esc(viaje.estado || "")}</div>
      </div>

      <div class="bloque">
        <h3>Datos de la Solicitud</h3>
        ${renderDatosSolicitud(orden, viaje, recursosVista, bloqueado)}
      </div>

      <div class="bloque">
        <h3>Datos de la Asignación</h3>
        ${renderDatosAsignacion(recursosVista, bloqueado)}
      </div>

      <div class="bloque">
        <h3>CONTROL Y SEGUIMIENTO</h3>
        <table class="seguimiento-table">
          <thead>
            <tr>
              <th></th>
              <th>Fecha</th>
              <th>Hs Inicio</th>
              <th>Hs Final</th>
              <th>Observaciones</th>
              <th>Hs Acumuladas / Extra
                <input id="seguimiento-total-extra" class="total-extra-box" type="text" value="${esc(totalExtraHoras)}" readonly>
              </th>
            </tr>
          </thead>
          <tbody id="seguimiento-body">${renderFilasSeguimientoConDatos(
            recursosVista.duracion_jornadas,
            formatearSoloFecha(recursosVista.fecha_salida_viaje || viaje.fecha_salida || ""),
            detalleDias,
            bloqueado
          )}</tbody>
        </table>

        <div class="seguimiento-checks">
          <div class="seguimiento-check-item">
            <label>Cumple Procedimiento</label>
            <select id="check-cumple-procedimiento" ${bloqueado ? "disabled" : ""}>
              <option value="SI" ${cumpleProcedimiento === "SI" ? "selected" : ""}>SI</option>
              <option value="NO" ${cumpleProcedimiento === "NO" ? "selected" : ""}>NO</option>
            </select>
          </div>

          <div class="seguimiento-check-item">
            <label>Nota Desvios</label>
            <select id="check-nota-desvios" ${bloqueado ? "disabled" : ""}>
              <option value="SI" ${notaDesvios === "SI" ? "selected" : ""}>SI</option>
              <option value="NO" ${notaDesvios === "NO" ? "selected" : ""}>NO</option>
            </select>
          </div>

          <div class="seguimiento-check-item">
            <label>Aplica Sanciones</label>
            <select id="check-aplica-sanciones" ${bloqueado ? "disabled" : ""}>
              <option value="SI" ${aplicaSanciones === "SI" ? "selected" : ""}>SI</option>
              <option value="NO" ${aplicaSanciones === "NO" ? "selected" : ""}>NO</option>
            </select>
          </div>
        </div>

        <div class="adjuntos-grid">
          <div class="adjunto-item">
            <label>Check List emitido por Mantenimiento del Equipo</label>
            <input id="adjunto-checklist" type="file" ${bloqueado ? "disabled" : ""}>
            ${checklistAdjunto
              ? `<a class="adjunto-link" href="${checklistUrl}" target="_blank" rel="noopener noreferrer">Abrir adjunto guardado</a>`
              : `<div class="cierre-msg">Sin adjunto guardado</div>`}
          </div>
          <div class="adjunto-item">
            <label>Formulario Logística de Viaje</label>
            <input id="adjunto-formulario" type="file" ${bloqueado ? "disabled" : ""}>
            ${formularioAdjunto
              ? `<a class="adjunto-link" href="${formularioUrl}" target="_blank" rel="noopener noreferrer">Abrir adjunto guardado</a>`
              : `<div class="cierre-msg">Sin adjunto guardado</div>`}
          </div>
        </div>

        <div class="cierre-footer">
          <button type="button" onclick="guardarCierreLogistica()" ${bloqueado ? "disabled" : ""}>GUARDAR</button>
          <span id="cierre-msg" class="cierre-msg"></span>
        </div>
      </div>

    </div>
  `;

  cont.innerHTML = html;
  if (!bloqueado) {
    activarEventosSolicitud();
    activarEventosAsignacion();
    activarCalculoHorasSeguimiento();
  }
}

function poblarSelector(ordenes) {
  const selector = document.getElementById("selector-os");
  selector.innerHTML = "";

  if (!Array.isArray(ordenes) || ordenes.length === 0) {
    selector.innerHTML = '<option value="">Sin ordenes para el filtro actual</option>';
    renderOrdenSeleccionada(null);
    return;
  }

  ordenes.forEach((orden, idx) => {
    const option = document.createElement("option");
    option.value = String(idx);
    const estadoTxt = estaOrdenCerrada(orden) ? "CERRADA" : "ABIERTA";
    option.textContent = `${orden.nro_orden || "SIN NUMERO"} | Viaje ID ${orden.id_viaje || "-"} | ${orden.fecha_orden || ""} | ${estadoTxt}`;
    selector.appendChild(option);
  });

  selector.value = "0";
  renderOrdenSeleccionada(ordenes[0]);
}

function aplicarFiltrosOrdenes(nroOrdenPreferida = "") {
  const soloCerradas = Boolean(document.getElementById("filtro-cerradas")?.checked);
  const termino = normalizarBusqueda(document.getElementById("busqueda-os")?.value || "");

  ordenesFiltradas = ordenesCache.filter((orden) => {
    if (soloCerradas && !estaOrdenCerrada(orden)) {
      return false;
    }
    return coincideBusquedaOrden(orden, termino);
  });

  poblarSelector(ordenesFiltradas);

  if (!nroOrdenPreferida || ordenesFiltradas.length === 0) {
    return;
  }

  const selector = document.getElementById("selector-os");
  const idx = ordenesFiltradas.findIndex((o) => String(o.nro_orden || "") === String(nroOrdenPreferida));
  if (idx >= 0 && selector) {
    selector.value = String(idx);
    renderOrdenSeleccionada(ordenesFiltradas[idx]);
  }
}

async function cargarOrdenes(nroOrdenPreferida = "") {
  await Promise.all([cargarNominaPersonal(), cargarNominaVehiculos()]);
  const res = await fetch("/ordenes");
  const ordenes = await res.json();

  ordenesCache = Array.isArray(ordenes) ? ordenes.slice().reverse() : [];
  aplicarFiltrosOrdenes(nroOrdenPreferida);
}

document.getElementById("selector-os").addEventListener("change", (e) => {
  const idx = Number(e.target.value);
  const orden = Number.isInteger(idx) ? ordenesFiltradas[idx] : null;
  renderOrdenSeleccionada(orden || null);
});

document.getElementById("filtro-cerradas").addEventListener("change", () => {
  aplicarFiltrosOrdenes();
});

document.getElementById("busqueda-os").addEventListener("input", () => {
  aplicarFiltrosOrdenes();
});

document.getElementById("btn-recargar").addEventListener("click", () => {
  cargarOrdenes();
});

document.getElementById("btn-imprimir").addEventListener("click", () => {
  const orden = obtenerOrdenActualSeleccionada();
  if (!orden) {
    alert("Seleccione una Orden de Salida antes de imprimir.");
    return;
  }
  const payload = {
    orden,
    cierre_snapshot: recolectarCierrePayload(),
    generado_en: new Date().toISOString(),
  };
  localStorage.setItem("os_print_payload", JSON.stringify(payload));
  const win = window.open("/print_orden_salida", "_blank", "noopener");
  if (!win) {
    alert("No se pudo abrir la vista de impresión. Verifique el bloqueador de ventanas emergentes.");
  }
});

cargarOrdenes().catch((err) => {
  document.getElementById("listado").innerHTML = `<div class="card">Error cargando ordenes: ${esc(err.message)}</div>`;
});
</script>

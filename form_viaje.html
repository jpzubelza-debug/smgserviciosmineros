<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solicitud de Viaje</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0b1120);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('/Imagenes/fondo_de_pantalla_dashboard.PNG') center center / cover no-repeat;
      opacity: 0.66;
      pointer-events: none;
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.2), transparent 48%),
        radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.18), transparent 45%);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
      padding: 25px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.66);
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.35);
      transition: none;
    }

    .card:hover {
      transform: none;
    }

    .logo-corner {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 3;
      padding: 0;
    }

    .logo-corner img {
      display: block;
      width: 195px;
      max-width: 38vw;
      height: auto;
    }

    .logo-box img { filter: none; }

    .logo-text {
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      color: #ffffff;
      margin-bottom: 20px;
    }

    form {
      width: 100%;
    }

    label {
      color: #ddd;
      font-size: 13px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px 0;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(2, 6, 23, 0.55);
      color: white;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    select option,
    select optgroup {
      background: #0f2237;
      color: #eef4ff;
    }

    select option:checked {
      background: #2f6fca;
      color: #ffffff;
    }

    select[multiple] {
      min-height: 120px;
    }

    .helper-text {
      margin-top: -10px;
      margin-bottom: 12px;
      color: #d6e7ff;
      font-size: 12px;
      opacity: 0.9;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(147, 197, 253, 0.85);
      box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.2);
    }

    input::placeholder,
    textarea::placeholder {
      color: #bbb;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: none;
      box-shadow: none;
    }

    #mensaje {
      color: #dff5ff;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .card {
        margin: 10px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
<div class="bg-photo"></div>
<div class="bg-blur"></div>
<div class="logo-corner logo-box">
  <img src="/Imagenes/09-smg.png" alt="Logo SMG">
</div>
<div class="card">
  <h2>Solicitud de Viaje</h2>

<form id="form">
  <label>Solicitante</label>
  <input type="text" id="solicitante" placeholder="Solicitante" required>

  <label>Área</label>
  <input type="text" id="area" list="areas" required>
  <datalist id="areas">
    <option value="Mantenimiento">
    <option value="Operaciones">
    <option value="Logística">
  </datalist>

  <label>Origen</label>
  <input type="text" id="origen" placeholder="Origen" required>

  <label>Destino</label>
  <input type="text" id="destino" list="destinos" required>
  <datalist id="destinos">
    <option value="Pirquitas">
    <option value="Exar">
    <option value="SDJ">
    <option value="Rincón">
    <option value="ARLI">
  </datalist>

  <label>Motivo</label>
  <textarea id="motivo" placeholder="Motivo" required rows="3" style="resize: vertical;"></textarea>

  <label>Fecha salida</label>
  <input type="date" id="fecha_salida" required>

  <label>Fecha regreso</label>
  <input type="date" id="fecha_regreso" required>

  <label>Chofer</label>
  <select id="chofer" required>
    <option value="">Seleccione un chofer</option>
  </select>

  <label>Vehiculo</label>
  <select id="vehiculo" required>
    <option value="">Seleccione un vehiculo</option>
  </select>

  <label>Acompanantes</label>
  <select id="acompanantes" multiple>
  </select>
  <div class="helper-text">Mantener Ctrl (Windows) o Cmd (Mac) para seleccionar varios.</div>

  <label>Requiere alojamiento</label>
  <select id="alojamiento" required>
    <option value="NO" selected>NO</option>
    <option value="SI">SI</option>
  </select>

  <button type="submit">Enviar</button>

  <p id="mensaje"></p>
</form>

<script>
let personalBase = [];

function obtenerHoyLocal() {
  const hoy = new Date();
  const year = hoy.getFullYear();
  const month = String(hoy.getMonth() + 1).padStart(2, "0");
  const day = String(hoy.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function configurarRestriccionesFechas() {
  const fechaSalidaInput = document.getElementById("fecha_salida");
  const fechaRegresoInput = document.getElementById("fecha_regreso");
  const hoy = obtenerHoyLocal();

  fechaSalidaInput.min = hoy;
  fechaRegresoInput.min = fechaSalidaInput.value || hoy;
}

function etiquetaPersona(persona) {
  const nombre = (persona?.nombre || "").toString().trim();
  const legajo = (persona?.legajo || "").toString().trim();
  if (!nombre) {
    return "";
  }
  return legajo ? `${nombre} (Legajo ${legajo})` : nombre;
}

function etiquetaVehiculo(vehiculo) {
  const codigo = (vehiculo?.codigo || "").toString().trim();
  const descripcion = (
    vehiculo?.descripcion ||
    vehiculo?.equipo ||
    vehiculo?.modelo ||
    vehiculo?.marca ||
    ""
  ).toString().trim();
  return descripcion ? `${codigo} - ${descripcion}` : codigo;
}

function actualizarOpcionesAcompanantes() {
  const selectChofer = document.getElementById("chofer");
  const selectAcompanantes = document.getElementById("acompanantes");
  const choferSeleccionado = (selectChofer.value || "").trim().toLowerCase();

  const seleccionPrev = new Set(Array.from(selectAcompanantes.selectedOptions).map(o => o.value));
  selectAcompanantes.innerHTML = "";

  personalBase
    .map(p => (p?.nombre || "").toString().trim())
    .filter(Boolean)
    .filter(nombre => nombre.toLowerCase() !== choferSeleccionado)
    .forEach(nombre => {
      const op = document.createElement("option");
      op.value = nombre;
      op.textContent = nombre;
      if (seleccionPrev.has(nombre)) {
        op.selected = true;
      }
      selectAcompanantes.appendChild(op);
    });
}

async function cargarPersonalYVehiculos() {
  const [resPersonal, resVehiculos] = await Promise.all([
    fetch("/personal"),
    fetch("/vehiculos")
  ]);

  const personal = await resPersonal.json();
  const vehiculos = await resVehiculos.json();

  personalBase = Array.isArray(personal) ? personal : [];

  const selectChofer = document.getElementById("chofer");
  const selectVehiculo = document.getElementById("vehiculo");

  personalBase.forEach(persona => {
    const nombre = (persona?.nombre || "").toString().trim();
    if (!nombre) {
      return;
    }
    const op = document.createElement("option");
    op.value = nombre;
    op.textContent = etiquetaPersona(persona);
    selectChofer.appendChild(op);
  });

  (Array.isArray(vehiculos) ? vehiculos : []).forEach(vehiculo => {
    const codigo = (vehiculo?.codigo || "").toString().trim();
    if (!codigo) {
      return;
    }
    const op = document.createElement("option");
    op.value = etiquetaVehiculo(vehiculo);
    op.textContent = etiquetaVehiculo(vehiculo);
    selectVehiculo.appendChild(op);
  });

  actualizarOpcionesAcompanantes();
}

document.getElementById("fecha_salida").addEventListener("change", function() {
  const fechaRegresoInput = document.getElementById("fecha_regreso");
  const hoy = obtenerHoyLocal();
  const minRegreso = this.value || hoy;
  fechaRegresoInput.min = minRegreso;

  if (fechaRegresoInput.value && fechaRegresoInput.value < minRegreso) {
    fechaRegresoInput.value = minRegreso;
  }
});

document.getElementById("chofer").addEventListener("change", actualizarOpcionesAcompanantes);

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  try {
    const fechaSalida = document.getElementById("fecha_salida").value;
    const fechaRegreso = document.getElementById("fecha_regreso").value;
    const hoy = obtenerHoyLocal();

    if (fechaSalida < hoy) {
      alert("La fecha de salida debe ser hoy o posterior");
      return;
    }

    if (fechaRegreso < fechaSalida) {
      alert("La fecha de regreso no puede ser menor que la de salida");
      return;
    }

    const data = {
      solicitante: document.getElementById("solicitante").value,
      area: document.getElementById("area").value,
      origen: document.getElementById("origen").value,
      destino: document.getElementById("destino").value,
      motivo: document.getElementById("motivo").value,
      fecha_salida: fechaSalida,
      fecha_regreso: fechaRegreso,
      chofer: document.getElementById("chofer").value,
      vehiculo: document.getElementById("vehiculo").value,
      acompanantes: Array.from(document.getElementById("acompanantes").selectedOptions).map(o => o.value),
      alojamiento: document.getElementById("alojamiento").value
    };

    const res = await fetch("/viajes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("mensaje").innerText =
      "Viaje creado correctamente (ID: " + result.id + ")";

    document.getElementById("form").reset();
    actualizarOpcionesAcompanantes();

  } catch (error) {
    console.error("ERROR:", error);
    alert("Error al enviar");
  }
});

// Auto-resize textarea motivo
document.getElementById("motivo").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";
});

configurarRestriccionesFechas();
cargarPersonalYVehiculos().catch(error => {
  console.error("No se pudieron cargar Personal/Vehiculos:", error);
  document.getElementById("mensaje").innerText = "No se pudieron cargar opciones de chofer y vehiculo";
});
</script>

</div>

</body>
</html>
